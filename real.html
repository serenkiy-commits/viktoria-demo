<title>Виктория — Real Data</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1a1c;--bg-deep:#061210;--card:rgba(16,42,44,0.6);
  --accent:#10b981;--accent-light:#2dd4a0;--gold:#f59e0b;
  --text:#eae5dc;--text-sec:#a09888;--text-muted:#6b6055;
  --border:rgba(234,229,220,0.08);
}
body{
  font-family:'Montserrat',sans-serif;
  background:linear-gradient(180deg,var(--bg) 0%,var(--bg-deep) 100%);
  color:var(--text);min-height:100vh;
  padding:16px 12px 30px;
  font-size:13px;
}
.page-wrapper{max-width:430px;margin:0 auto}
.title{
  font-size:22px;font-weight:800;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  margin-bottom:4px
}
.subtitle{color:var(--text-sec);font-size:12px;margin-bottom:16px;line-height:1.5}
.banner{
  background:linear-gradient(135deg,rgba(16,185,129,0.15),rgba(245,158,11,0.08));
  border:1px solid rgba(16,185,129,0.3);border-radius:12px;
  padding:10px 12px;margin-bottom:18px;font-size:11px;line-height:1.5
}
.banner strong{color:var(--accent-light)}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.stat{
  background:var(--card);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:14px;padding:12px
}
.stat-label{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.stat-value{font-size:22px;font-weight:800;margin-top:4px;color:var(--accent-light)}
.stat-value.gold{color:var(--gold)}
.stat-sub{font-size:10px;color:var(--text-sec);margin-top:2px}

.section{
  background:var(--card);backdrop-filter:blur(16px);
  border:1px solid var(--border);border-radius:14px;
  padding:14px;margin-bottom:14px
}
.section h2{
  font-size:14px;font-weight:700;margin-bottom:12px;
  display:flex;align-items:center;gap:6px
}
.section h2 .cnt{
  font-size:10px;padding:2px 8px;background:rgba(16,185,129,0.15);
  color:var(--accent-light);border-radius:8px;margin-left:auto
}

/* Timeline */
.timeline{display:grid;grid-template-columns:repeat(12,1fr);gap:2px}
.timeline-col{text-align:center}
.timeline-bar{height:50px;display:flex;align-items:flex-end;justify-content:center}
.timeline-bar>div{width:80%;border-radius:3px 3px 0 0;transition:all 0.3s}
.timeline-h{font-size:8px;color:var(--text-muted);margin-top:2px}
.timeline-val{font-size:9px;font-weight:700}
.legend{display:flex;gap:10px;margin-bottom:8px;font-size:10px;color:var(--text-sec);flex-wrap:wrap}
.legend span{display:flex;align-items:center;gap:4px}
.legend-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* Tables */
.hall-tabs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:12px}
.hall-tab{
  padding:8px 4px;background:var(--card);border:1px solid var(--border);
  color:var(--text);border-radius:8px;cursor:pointer;
  font-weight:600;font-size:10px;transition:all 0.2s;
  font-family:inherit
}
.hall-tab.active{
  background:linear-gradient(135deg,var(--accent),var(--accent-light));
  color:var(--bg);border-color:transparent
}
.tables-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.table-card{
  background:var(--bg-deep);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;transition:all 0.2s
}
.table-card:active{transform:scale(0.97)}
.table-photo{
  width:100%;height:90px;background-size:cover;background-position:center;
  background-color:#0f3a2a;position:relative
}
.table-photo .badge{
  position:absolute;top:6px;right:6px;padding:2px 6px;border-radius:6px;
  font-size:8px;font-weight:700;backdrop-filter:blur(8px);
  background:rgba(10,26,28,0.85)
}
.badge.free{color:var(--accent-light);border:1px solid rgba(16,185,129,0.4)}
.badge.busy{color:#ef4444;border:1px solid rgba(239,68,68,0.4)}
.table-info{padding:8px 10px}
.table-num{font-size:14px;font-weight:800}
.table-meta{font-size:9px;color:var(--text-sec);margin-top:2px}
.hall-tag{
  font-size:8px;padding:1px 6px;background:rgba(245,158,11,0.15);
  color:var(--gold);border-radius:5px;display:inline-block;margin-top:4px
}
.hall-tag.main{background:rgba(16,185,129,0.15);color:var(--accent-light)}
.no-photo{display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:32px;opacity:0.3}

/* Reserves */
.filter{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:12px}
.filter button{
  padding:7px 4px;background:var(--card);border:1px solid var(--border);
  color:var(--text);border-radius:8px;font-size:10px;font-weight:500;
  cursor:pointer;transition:all 0.2s;font-family:inherit
}
.filter button.active{
  background:var(--accent);color:var(--bg);
  border-color:var(--accent);font-weight:700
}
.rsv{
  background:var(--bg-deep);border:1px solid var(--border);
  border-radius:10px;padding:10px;margin-bottom:6px
}
.rsv-row1{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rsv-time{font-weight:700;color:var(--accent-light);font-size:12px}
.rsv-count{font-size:10px;color:var(--text-sec)}
.rsv-name{font-weight:600;font-size:12px}
.rsv-phone{font-size:10px;color:var(--text-muted)}
.rsv-meta{font-size:10px;color:var(--text-muted);margin-top:2px}
.rsv-row3{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.rsv-deposit{font-weight:700;color:var(--gold);font-size:11px}
.rsv-status{display:flex;gap:4px}
.rsv-status span{font-size:8px;padding:2px 6px;border-radius:5px;font-weight:700}
.paid{background:rgba(16,185,129,0.15);color:var(--accent-light)}
.unpaid{background:rgba(245,158,11,0.15);color:var(--gold)}
.fromwidget{background:rgba(16,185,129,0.08);color:var(--accent-light)}
.fromadmin{background:rgba(107,96,85,0.15);color:var(--text-sec)}
.empty{padding:20px;text-align:center;color:var(--text-muted);font-size:11px}
</style>

<script>
let currentHall = 'all';
let currentRsvFilter = 'all';

function renderStats(){
  const s = DATA.stats;
  const paidCount = DATA.reserves.filter(r=>r.deposit_paid>0).length;
  const totalGuests = DATA.reserves.reduce((sum,r)=>sum+(r.count||0),0);
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-label">Всего столов</div><div class="stat-value">${DATA.items.length}</div><div class="stat-sub">в 2 залах</div></div>
    <div class="stat"><div class="stat-label">Броней сегодня</div><div class="stat-value">${s.active_reserves}</div><div class="stat-sub">активных</div></div>

    <div class="stat"><div class="stat-label">Депозиты</div><div class="stat-value gold">${s.total_deposit.toLocaleString('ru-RU')} ₽</div><div class="stat-sub">${paidCount} оплачено</div></div>
  `;
}

function renderTables(){
  const grid = document.getElementById('tablesGrid');
  let filtered = DATA.items;
  if (currentHall !== 'all') filtered = filtered.filter(i=>i.hall==currentHall);
  document.getElementById('tablesCount').textContent = filtered.length;

  const now = new Date('2026-04-15T20:00:00');
  grid.innerHTML = filtered.map(t=>{
    const busy = DATA.reserves.some(r=>{
      if (!r.item_ids.includes(t.id) || !r.from || !r.to) return false;
      const f = new Date(r.from.replace(' ','T'));
      const to = new Date(r.to.replace(' ','T'));
      return now >= f && now <= to;
    });
    const isBilliard = t.hall === 39790;
    const hallName = isBilliard ? 'Бильярд' : 'Основной';
    const hallCls = isBilliard ? '' : 'main';
    const photo = t.preview || t.photo;
    const photoStyle = photo ? `background-image:url('${photo}')` : '';
    const emoji = isBilliard ? '🎱' : '🍽';
    return `<div class="table-card">
      <div class="table-photo" style="${photoStyle}">
        ${photo ? '' : '<div class="no-photo">'+emoji+'</div>'}
        <span class="badge ${busy?'busy':'free'}">${busy?'ЗАНЯТ':'СВОБ'}</span>
      </div>
      <div class="table-info">
        <div class="table-num">№${t.number}</div>
        <div class="table-meta">👥 ${t.min}–${t.max} мест</div>
        <span class="hall-tag ${hallCls}">${hallName}</span>
      </div>
    </div>`;
  }).join('');
}

function filterHall(id, btn){
  currentHall = id;
  document.querySelectorAll('.hall-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderTables();
}

function renderReserves(){
  let filtered = DATA.reserves.filter(r=>r.from && r.from.startsWith('2026-04-15'));
  if (currentRsvFilter==='paid') filtered=filtered.filter(r=>r.deposit_paid>0);
  if (currentRsvFilter==='unpaid') filtered=filtered.filter(r=>r.deposit_paid==0 && r.deposit_price>0);
  if (currentRsvFilter==='widget') filtered=filtered.filter(r=>r.source==='widget' || r.source==='web');

  filtered.sort((a,b)=>(a.from||'').localeCompare(b.from||''));
  document.getElementById('reservesCount').textContent = filtered.length;

  const list = document.getElementById('reservesList');
  if (filtered.length===0){
    list.innerHTML = '<div class="empty">Нет броней в этой категории</div>';
    return;
  }

  list.innerHTML = filtered.slice(0,30).map(r=>{
    const timeFrom = r.from ? r.from.split(' ')[1].slice(0,5) : '—';
    const timeTo = r.to ? r.to.split(' ')[1].slice(0,5) : '—';
    const paid = r.deposit_paid > 0;
    const hasDeposit = r.deposit_price > 0;
    const tableIds = r.item_ids.map(id=>{
      const item = DATA.items.find(i=>i.id===id);
      return item ? '№'+item.number : '?';
    }).join(', ');
    const isBilliard = r.floor_id === 39790;
    const source = r.source==='widget' || r.source==='web' ? 'widget' : r.source==='adminpanel' ? 'admin' : '';
    return `<div class="rsv">
      <div class="rsv-row1">
        <span class="rsv-time">${timeFrom}—${timeTo}</span>
        <span class="rsv-count">👥 ${r.count||1}</span>
      </div>
      <div class="rsv-name">${r.name||'—'}</div>
      <div class="rsv-phone">+${r.phone||'—'}</div>
      <div class="rsv-meta">${isBilliard?'🎱 Бильярд':'🍽 Осн. зал'} · ${tableIds}</div>
      <div class="rsv-row3">
        <span class="rsv-deposit">${hasDeposit ? r.deposit_price.toLocaleString('ru-RU')+' ₽' : '<span style="color:var(--text-muted);font-weight:400">без депозита</span>'}</span>
        <span class="rsv-status">
          ${hasDeposit ? (paid ? '<span class="paid">ОПЛАЧЕН</span>' : '<span class="unpaid">ЖДЁТ</span>') : ''}
          ${source==='widget' ? '<span class="fromwidget">Виджет</span>' : source==='admin' ? '<span class="fromadmin">Админ</span>' : ''}
        </span>
      </div>
    </div>`;
  }).join('') + (filtered.length>30 ? `<div class="empty">... и ещё ${filtered.length-30} броней</div>` : '');
}

function filterReserves(f, btn){
  currentRsvFilter = f;
  document.querySelectorAll('.filter button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderReserves();
}

function renderTimeline(){
  const hours = [];
  for (let h=12; h<=23; h++) hours.push(h);
  const busy = {};
  DATA.reserves.forEach(r=>{
    if (!r.from || !r.to || !r.from.startsWith('2026-04-15')) return;
    const fh = parseInt(r.from.split(' ')[1].slice(0,2));
    const th = parseInt(r.to.split(' ')[1].slice(0,2));
    for (let h=fh; h<=th && h<=23; h++) busy[h] = (busy[h]||0) + r.item_ids.length;
  });
  const total = DATA.items.length;
  document.getElementById('timeline').innerHTML = hours.map(h=>{
    const b = busy[h]||0;
    const pct = Math.min(Math.round(b/total*100), 100);
    const col = pct>70?'#ef4444':pct>40?'var(--gold)':'var(--accent)';
    return `<div class="timeline-col">
      <div class="timeline-bar"><div style="height:${Math.max(pct,5)}%;background:${col}"></div></div>
      <div class="timeline-h">${h}</div>
      <div class="timeline-val">${b}</div>
    </div>`;
  }).join('');
}

renderStats();
renderTables();
renderReserves();
renderTimeline();
</script>
</body>
</html>
